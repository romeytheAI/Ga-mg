name: DAFL Revenue Sidecar - Auto Deploy

on:
  push:
    branches: [main]
    paths:
      - 'revenue-sidecar/**'
  pull_request:
    branches: [main]
    paths:
      - 'revenue-sidecar/**'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Deployment mode'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - test

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/revenue-sidecar

jobs:
  # ==========================
  # Build and Test
  # ==========================
  build-and-test:
    name: Build and Test Sidecar
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: revenue-sidecar

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run linting
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests
        run: |
          pytest -v || echo "No tests found"

  # ==========================
  # Build Docker Image
  # ==========================
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./revenue-sidecar
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ==========================
  # Deploy to Cloud Run (GCP)
  # ==========================
  deploy-gcp:
    name: Deploy to Google Cloud Run
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy revenue-sidecar \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars="GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --set-env-vars="OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
            --set-env-vars="STRIPE_SECRET=${{ secrets.STRIPE_SECRET }}" \
            --set-env-vars="GITHUB_PAT=${{ secrets.GITHUB_PAT }}" \
            --memory 2Gi \
            --cpu 2 \
            --max-instances 10 \
            --min-instances 1

  # ==========================
  # Monitor and Health Check
  # ==========================
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy-gcp
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Check service health
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://revenue-sidecar-XXXXXXXX.run.app/)
          if [ $RESPONSE -eq 200 ]; then
            echo "✅ Health check passed"
          else
            echo "❌ Health check failed with status $RESPONSE"
            exit 1
          fi

      - name: Check metrics endpoint
        run: |
          curl -f https://revenue-sidecar-XXXXXXXX.run.app/metrics || exit 1

  # ==========================
  # Auto-Start Sidecar
  # ==========================
  auto-start:
    name: Auto-Start Revenue Sidecar
    runs-on: ubuntu-latest
    needs: health-check

    steps:
      - name: Start autonomous sidecar
        run: |
          curl -X POST https://revenue-sidecar-XXXXXXXX.run.app/sidecar/start

      - name: Verify sidecar running
        run: |
          sleep 5
          STATUS=$(curl -s https://revenue-sidecar-XXXXXXXX.run.app/ | jq -r '.status')
          if [ "$STATUS" == "running" ]; then
            echo "✅ Sidecar is running"
          else
            echo "⚠️ Sidecar status: $STATUS"
          fi

  # ==========================
  # Notify Deployment
  # ==========================
  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: auto-start
    if: always()

    steps:
      - name: Send notification
        run: |
          echo "DAFL Revenue Sidecar deployment complete"
          echo "Status: ${{ needs.auto-start.result }}"

      # Optional: Send to Discord, Slack, or email
      # - name: Discord notification
      #   uses: sarisia/actions-status-discord@v1
      #   with:
      #     webhook: ${{ secrets.DISCORD_WEBHOOK }}
      #     title: "DAFL Sidecar Deployed"
      #     description: "Revenue sidecar is now autonomous"
