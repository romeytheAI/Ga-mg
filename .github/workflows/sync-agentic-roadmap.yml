name: Sync Agentic Roadmap

on:
  workflow_dispatch:
    inputs:
      project-number:
        description: Projects V2 number to add items into (optional)
        required: false
        type: string
      dry-run:
        description: Only log actions without writing
        required: false
        default: false
        type: boolean
  push:
    paths:
      - docs/agentic-roadmap.json
      - .github/workflows/sync-agentic-roadmap.yml

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sync roadmap issues and project
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const core = require('@actions/core');

            const roadmapPath = path.join(process.cwd(), 'docs', 'agentic-roadmap.json');
            if (!fs.existsSync(roadmapPath)) {
              throw new Error(`Roadmap file not found at ${roadmapPath}`);
            }

            const roadmap = JSON.parse(fs.readFileSync(roadmapPath, 'utf8'));
            const items = Array.isArray(roadmap.issues) ? roadmap.issues : [];
            if (!items.length) {
              core.info('No roadmap items found; exiting.');
              return;
            }

            const { owner, repo } = context.repo;
            const repoInfo = await github.rest.repos.get({ owner, repo });
            const ownerLogin = repoInfo.data.owner.login;
            const ownerType = repoInfo.data.owner.type;

            // getBooleanInput / getInput throw when the workflow is triggered by
            // push (no inputs object). Fall back to safe defaults.
            let dryRun = false;
            let projectInput = '';
            try { dryRun = core.getBooleanInput('dry-run'); } catch (_) { /* push trigger */ }
            try { projectInput = core.getInput('project-number'); } catch (_) { /* push trigger */ }
            const projectNumber = projectInput ? parseInt(projectInput, 10) : null;
            const baseLabels = ['roadmap', 'maxvp', 'automation'];

            const normalize = str => (str || '').replace(/\r\n/g, '\n').trim();

            const desiredIssues = items.map(item => ({
              title: normalize(item.title),
              body: normalize(Array.isArray(item.body_lines) ? item.body_lines.join('\n') : ''),
              labels: Array.from(new Set([...(item.labels || []), ...baseLabels])),
              assignees: item.assignees || []
            }));

            // Search all issues (open and closed) to avoid duplicates
            const allIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'all',
              per_page: 100
            });

            // Filter out Pull Requests
            const existingIssues = allIssues.filter(i => !i.pull_request);

            let projectId = null;
            if (projectNumber) {
              try {
                const query =
                  ownerType === 'Organization'
                    ? `query($login:String!, $number:Int!) { organization(login:$login) { projectV2(number:$number) { id } } }`
                    : `query($login:String!, $number:Int!) { user(login:$login) { projectV2(number:$number) { id } } }`;

                const projectData = await github.graphql(query, { login: ownerLogin, number: projectNumber });
                const projectNode = ownerType === 'Organization'
                  ? projectData.organization?.projectV2
                  : projectData.user?.projectV2;

                if (!projectNode?.id) {
                  core.warning(`Project number ${projectNumber} not found for ${ownerType} ${ownerLogin}. Skipping project link.`);
                } else {
                  projectId = projectNode.id;
                  core.info(`Resolved project ${projectNumber} to node ${projectId}`);
                }
              } catch (err) {
                core.warning(`Failed to resolve project: ${err.message}. Ensure GITHUB_TOKEN has project scopes or use a PAT.`);
              }
            }

            const addedIssues = [];
            const updatedIssues = [];

            const labelNames = labels => labels.map(l => (typeof l === 'string' ? l : l.name));
            
            for (const item of desiredIssues) {
              const existing = existingIssues.find(i => normalize(i.title) === item.title);

              if (existing) {
                // Skip closed issues
                if (existing.state === 'closed') {
                  core.info(`Issue #${existing.number} (${item.title}) exists but is closed. Skipping.`);
                  continue;
                }

                const currentBody = normalize(existing.body);
                const currentLabels = labelNames(existing.labels || []);
                
                const needsBodyUpdate = currentBody !== item.body;
                // Additive label sync: only update if missing desired labels
                const needsLabelUpdate = item.labels.some(l => !currentLabels.includes(l));

                if (needsBodyUpdate || needsLabelUpdate) {
                  const finalLabels = Array.from(new Set([...currentLabels, ...item.labels]));
                  
                  if (dryRun) {
                    core.info(`[dry-run] Would update issue #${existing.number} (${item.title})`);
                  } else {
                    await github.rest.issues.update({
                      owner,
                      repo,
                      issue_number: existing.number,
                      body: item.body,
                      labels: finalLabels
                    });
                    updatedIssues.push(existing.number);
                    core.info(`Updated issue #${existing.number} (${item.title})`);
                  }
                } else {
                  core.info(`Issue #${existing.number} (${item.title}) already up to date`);
                }

                if (projectId && !dryRun) {
                  try {
                    await github.graphql(
                      `mutation($projectId:ID!, $contentId:ID!) {
                        addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                          item { id }
                        }
                      }`,
                      { projectId, contentId: existing.node_id }
                    );
                  } catch (error) {
                    if (!error.message.includes('already exists')) throw error;
                  }
                }
                continue;
              }

              if (dryRun) {
                core.info(`[dry-run] Would create issue: ${item.title}`);
                continue;
              }

              const created = await github.rest.issues.create({
                owner,
                repo,
                title: item.title,
                body: item.body,
                labels: item.labels,
                assignees: item.assignees
              });

              addedIssues.push(created.data.number);
              core.info(`Created issue #${created.data.number} (${item.title})`);

              if (projectId) {
                try {
                  await github.graphql(
                    `mutation($projectId:ID!, $contentId:ID!) {
                      addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                        item { id }
                      }
                    }`,
                    { projectId, contentId: created.data.node_id }
                  );
                } catch (error) {
                  if (!error.message.includes('already exists')) throw error;
                }
              }
            }

            core.summary.addHeading('Agentic roadmap sync results');
            core.summary.addList([
              `Created: ${addedIssues.length ? addedIssues.join(', ') : '0'}`,
              `Updated: ${updatedIssues.length ? updatedIssues.join(', ') : '0'}`,
              `Project linked: ${projectId ? `yes (number ${projectNumber})` : 'no'}`
            ]);
            await core.summary.write();
