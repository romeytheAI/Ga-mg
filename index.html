<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      window.addEventListener('error', function(e) {
        var div = document.createElement('div');
        div.style.cssText = 'color:red; font-size:20px; padding:20px; background:black; position:fixed; top:0; left:0; z-index:9999; white-space:pre-wrap;';
        var errorMsg = (e.message || 'Unknown error') + '\n' + (e.filename || 'unknown file') + ':' + (e.lineno || '0') + ':' + (e.colno || '0');
        div.textContent = errorMsg;
        document.body.appendChild(div);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
