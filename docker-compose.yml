version: '3.8'

services:
  # Frontend - Ga-mg React Application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_SIDECAR_URL=http://sidecar:8001
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    depends_on:
      - sidecar
    networks:
      - dafl-network

  # Revenue Sidecar - Autonomous Funding Engine
  sidecar:
    build:
      context: ./revenue-sidecar
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - STRIPE_SECRET=${STRIPE_SECRET}
      - GITHUB_PAT=${GITHUB_PAT}
      - TIKTOK_ACCESS_TOKEN=${TIKTOK_ACCESS_TOKEN}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
    volumes:
      - ./revenue-sidecar:/app
      - content-output:/tmp/content
    networks:
      - dafl-network
    restart: unless-stopped

volumes:
  content-output:

networks:
  dafl-network:
    driver: bridge
