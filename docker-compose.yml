version: '3.8'

services:
  # Frontend - Ga-mg React Application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
