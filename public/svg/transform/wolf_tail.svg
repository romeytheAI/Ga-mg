<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 250">
  <defs>
    <linearGradient id="wolfTailGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a5a5a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a3a3a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wolfTailTip" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8c8c8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Tail -->
  <path d="M 75,140 Q 100,155 110,180 Q 118,205 108,230" 
        fill="none" stroke="url(#wolfTailGrad)" stroke-width="14" stroke-linecap="round"/>

  <!-- Fluffy tail tip -->
  <ellipse cx="108" cy="235" rx="12" ry="15" fill="url(#wolfTailTip)"/>
</svg>